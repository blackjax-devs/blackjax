name: Bug report
description: Create a bug report to help us reproduce and fix it.
title: "[Bug] "
labels: ["bug"]

body:
  - type: markdown
    attributes:
      value: |
        Thank you for taking the time to file a bug report. Please search open and closed issues before filing to avoid duplicates.

  - type: checkboxes
    id: checklist
    attributes:
      label: Checklist
      options:
        - label: I have searched existing issues and this is not a duplicate.
          required: true
        - label: I can reproduce this with the latest version of BlackJAX.
          required: true

  - type: textarea
    id: description
    attributes:
      label: Describe the bug
      description: A clear and concise description of what the bug is.
    validations:
      required: true

  - type: textarea
    id: reproduce
    attributes:
      label: Minimal reproducible example
      description: >
        A self-contained code snippet that reproduces the problem.
        The shorter the better — strip everything unrelated to the bug.
      placeholder: |
        import jax
        import jax.numpy as jnp
        import blackjax

        # minimal code that triggers the bug
      render: python
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behaviour
      description: What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual behaviour / error message
      description: What actually happened? Paste the full traceback if applicable.
      render: shell
    validations:
      required: true

  - type: textarea
    id: versions
    attributes:
      label: Version and environment info
      description: |
        Run the snippet below and paste the output. Also note your hardware (CPU / GPU / TPU) — many JAX bugs are device-specific.
      placeholder: |
        # Run this and paste the output:
        import blackjax; print("BlackJAX", blackjax.__version__)
        import jax; print("JAX", jax.__version__)
        import jaxlib; print("jaxlib", jaxlib.__version__)
        import sys; print("Python", sys.version)
        print("Devices:", jax.devices())
      render: python
    validations:
      required: true

  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Anything else that might help us understand the issue (model type, array shapes, OS, etc.).
