name: Release

on:
  release:
    types:
      - created

jobs:
  release-job:
    name: Build and publish on PyPi
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3
      with:
        fetch-depth: 0
    - name: Set up uv
      uses: astral-sh/setup-uv@v5
      with:
        python-version: "3.12"
    - name: Build sdist and wheel
      run: uv build
    - name: Check that the package version matches the Release name
      run: |
        TAG_VERSION="${GITHUB_REF:10}"
        TAG_VERSION="${TAG_VERSION#v}"
        ls dist/blackjax-${TAG_VERSION}.tar.gz || (echo "Version mismatch: dist/ has $(ls dist/)" && exit 1)
    - name: Check sdist install and imports
      run: |
        uv venv /tmp/venv-sdist
        uv pip install --python /tmp/venv-sdist/bin/python dist/blackjax-*.tar.gz
        /tmp/venv-sdist/bin/python -c "import blackjax"
    - name: Check wheel install and imports
      run: |
        uv venv /tmp/venv-wheel
        uv pip install --python /tmp/venv-wheel/bin/python dist/blackjax-*.whl
        /tmp/venv-wheel/bin/python -c "import blackjax"
    - name: Publish to PyPi
      uses: pypa/gh-action-pypi-publish@v1.13.0
      with:
        user: __token__
        password: ${{ secrets.PYPI_TOKEN }}

  test-install-job:
    name: Test install from PyPi
    needs: release-job
    runs-on: ubuntu-latest
    steps:
    - name: Set up uv
      uses: astral-sh/setup-uv@v5
      with:
        python-version: "3.12"
    - name: Give PyPI some time to update the index
      run: sleep 240
    - name: Attempt install from PyPI
      run: |
        TAG_VERSION="${GITHUB_REF:10}"
        uv pip install blackjax==${TAG_VERSION#v}
